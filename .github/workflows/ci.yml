name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: https://roleforge-api-224015900616.us-central1.run.app
          NEXT_PUBLIC_SITE_URL: https://roleforgeai.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Wait for Vercel deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run wait:vercel
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Smoke production shell
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run smoke:frontend
        env:
          ROLEFORGE_SMOKE_COOKIE: ${{ secrets.ROLEFORGE_SMOKE_COOKIE }}
