name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * *"

jobs:
  smoke:
    name: Live frontend smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Smoke live frontend
        run: node scripts/smoke_frontend.mjs --require-signed-in-smoke
        env:
          ROLEFORGE_SITE_URL: https://roleforgeai.vercel.app
          ROLEFORGE_BACKEND_URL: https://roleforge-api-224015900616.us-central1.run.app
          ROLEFORGE_SMOKE_COOKIE: ${{ secrets.ROLEFORGE_SMOKE_COOKIE }}
          ROLEFORGE_SUPABASE_URL: ${{ vars.ROLEFORGE_SUPABASE_URL }}
          ROLEFORGE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.ROLEFORGE_SUPABASE_PUBLISHABLE_KEY }}
          ROLEFORGE_SMOKE_EMAIL: ${{ secrets.ROLEFORGE_SMOKE_EMAIL }}
          ROLEFORGE_SMOKE_PASSWORD: ${{ secrets.ROLEFORGE_SMOKE_PASSWORD }}
          ROLEFORGE_REQUIRE_SIGNED_IN_SMOKE: ${{ vars.ROLEFORGE_REQUIRE_SIGNED_IN_SMOKE }}
          ROLEFORGE_EXPECT_PREMIUM_ACCESS: ${{ vars.ROLEFORGE_EXPECT_PREMIUM_ACCESS }}
